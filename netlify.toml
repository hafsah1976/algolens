[build]
  command = "npm run build:client"
  functions = "netlify/functions"
  publish = "client/dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--include=dev"

[functions]
  external_node_modules = ["express", "mongoose", "serverless-http"]
  included_files = ["server/src/**"]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
